services:
  # Discord bot 本体。opencode サーバーは同梱せず、別デプロイの opencode-server へ
  # OPENCODE_BASE_URL で HTTP 接続する（サーバーとアプリを疎結合に分離）。
  bot:
    build: .
    env_file:
      - .env
    environment:
      # 接続先 opencode サーバー（opencode-server を別途デプロイした URL）。必須。
      OPENCODE_BASE_URL: ${OPENCODE_BASE_URL:?OPENCODE_BASE_URL is required (set it in .env; points to your opencode-server deployment)}
    volumes:
      # thread_id ↔ session_id のマッピングをホスト側に永続化。
      - ./.data:/app/.data
    restart: unless-stopped
