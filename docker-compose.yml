services:
  # ホストの opencode serve をコンテナ化したもの。
  opencode:
    build: ./opencode
    env_file:
      # LITELLM_BASE_URL / LITELLM_API_KEY を注入（opencode.json から {env:...} で参照）。
      - .env
    environment:
      OPENCODE_CONFIG: /config/opencode.json
      XDG_DATA_HOME: /data
      # git の HTTPS 認証は n8n ブローカー経由の短命トークンで行う（静的 GitHub トークンは持たせない）。
      # プラグイン(github-token.js)が発行/失効し、credential helper が受け渡す。その n8n の親 URL。
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL:?N8N_WEBHOOK_BASE_URL is required (set it in .env)}
      # コミット著者情報は git ネイティブの env で注入する。.env の 1 組を 4 変数に展開。
      GIT_AUTHOR_NAME: ${GIT_USER_NAME:?GIT_USER_NAME is required (set it in .env)}
      GIT_AUTHOR_EMAIL: ${GIT_USER_EMAIL:?GIT_USER_EMAIL is required (set it in .env)}
      GIT_COMMITTER_NAME: ${GIT_USER_NAME}
      GIT_COMMITTER_EMAIL: ${GIT_USER_EMAIL}
    working_dir: /root/project
    volumes:
      # プロバイダ設定（API キーは含まず env 置換）。
      - ./opencode/opencode.json:/config/opencode.json:ro
      # セッション DB を永続化（thread→session マッピングの参照先を保持）。
      - opencode-data:/data
      # PKM vault（Obsidian）を読み書き可能でマウント。これが opencode のプロジェクトルート。
      # ホスト側パスは .env の PKM_VAULT_PATH で指定（必須）。
      - ${DOCS_REPO_PATH:?DOCS_REPO_PATH is required (set it in .env)}:/root/project
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4096/global/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  bot:
    build: .
    env_file:
      - .env
    environment:
      # 同一ネットワーク内の opencode サービスへ接続（env_file の値より優先）。
      OPENCODE_BASE_URL: "http://opencode:4096"
    depends_on:
      opencode:
        condition: service_healthy
    volumes:
      # thread_id ↔ session_id のマッピングをホスト側に永続化。
      - ./.data:/app/.data
    restart: unless-stopped

volumes:
  opencode-data:
